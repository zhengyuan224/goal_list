<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium Goal & Task Tracker Desktop Widget" />
  <title>Goal Tracker</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div id="app">

    <!-- ═══════════════════════════════════════
         TITLE BAR / DRAG REGION
    ════════════════════════════════════════ -->
    <div id="titlebar">
      <div class="app-title">
        <!-- Sparkle / target icon -->
        <svg class="title-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
        <span>Goals</span>
      </div>

      <!-- Drag indicator dots -->
      <div class="drag-indicator" style="position:absolute;left:50%;transform:translateX(-50%);">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- Window controls -->
      <div class="win-controls">
        <!-- Pin / always-on-top toggle -->
        <button id="pin-btn" class="win-btn pin-btn active" data-tooltip="Always on Top"
                onclick="togglePin()" title="Toggle Always on Top">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v6m0 0l3-3m-3 3l-3-3"/>
            <rect x="7" y="8" width="10" height="6" rx="2"/>
            <path d="M12 14v8"/>
          </svg>
        </button>
        <!-- Minimize -->
        <button class="win-btn" onclick="window.electronAPI.minimize()" title="Minimize">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <!-- Close -->
        <button class="win-btn close-btn" onclick="window.electronAPI.close()" title="Close">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
         PROGRESS BAR
    ════════════════════════════════════════ -->
    <div id="progress-section">
      <div class="progress-header">
        <span class="progress-label">Progress</span>
        <span class="progress-count" id="progress-count">0 / 0</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
         TASK LIST
    ════════════════════════════════════════ -->
    <div id="task-list-container">
      <ul id="task-list" role="list" aria-label="Task list">
        <!-- Tasks rendered by renderer.js -->
      </ul>
    </div>

    <!-- ═══════════════════════════════════════
         FOOTER
    ════════════════════════════════════════ -->
    <div id="footer">
      <!-- Clear completed bar (reveals when there are done tasks) -->
      <div class="clear-completed-bar" id="clear-bar">
        <button class="clear-btn" id="clear-btn" onclick="clearCompleted()">
          Clear completed
        </button>
      </div>

      <!-- Input area -->
      <div id="input-area">
        <input
          type="text"
          id="task-input"
          placeholder="Add a new goal…"
          autocomplete="off"
          spellcheck="false"
          maxlength="120"
          aria-label="New task input"
        />
        <button id="add-btn" onclick="addTask()" title="Add task" aria-label="Add task">
          <!-- Plus icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
